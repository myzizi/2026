<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Zizi - MyZizi 2026</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #008080; /* Background Teal */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
            overflow: hidden;
            position: relative;
            transition: background-color 1s ease, color 1s ease;
        }
        .container {
            text-align: center;
            padding: 2rem;
            width: 100%;
            max-width: 800px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.4s ease;
        }
        h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            transition: all 1s ease;
        }
        .choices {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            flex-wrap: nowrap;
        }
        .square {
            width: clamp(120px, 40vw, 200px);
            height: clamp(120px, 40vw, 200px);
            background: white;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
        }
        .square img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .me-text {
            color: #008080;
            font-size: clamp(1rem, 4vw, 2rem);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            transition: color 1s ease;
        }
        .arrow { display: inline-block; }
        .arrow-left { animation: moveLeft 1.2s infinite ease-in-out; }
        .arrow-right { animation: moveRight 1.2s infinite ease-in-out; }
        
        @keyframes moveLeft {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(8px); }
        }
        @keyframes moveRight {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-8px); }
        }
        
        #checkmark {
            display: none;
            margin-left: 10px;
        }

        .birthday-btn {
            display: none; /* Hidden by default */
            margin-top: 40px;
            padding: 12px 25px;
            background: #ff69b4;
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
            transition: transform 0.2s, background 0.2s;
            font-size: 1rem;
        }
        .birthday-btn:hover {
            transform: scale(1.05);
            background: #ff1493;
        }

        #haechan-box.moved {
            position: fixed;
            z-index: 100;
        }

        /* Final State Styles */
        body.final-state {
            background-color: white !important;
            color: #008080 !important;
            transition: none !important;
        }
        body.final-state h1 {
            text-shadow: none;
            font-weight: bold;
        }
        body.final-state #me-box {
            background-color: white !important;
            box-shadow: none;
            transform: scale(1) !important;
        }
        body.final-state #haechan-box {
            background: transparent !important;
            box-shadow: none !important;
            transition: all 1.5s ease-in-out !important; /* Diperlambat */
        }
        body.final-state .arrow { display: none !important; }
        body.final-state #checkmark { display: inline-block !important; }
        body.final-state .birthday-btn { 
            display: inline-block; /* Show only in final state */
            background: #008080;
            box-shadow: 0 4px 15px rgba(0, 128, 128, 0.2);
        }

        /* Birthday Page Styles */
        .birthday-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100vh;
            background: #fff0f5; /* Lavender Blush */
            color: #d02090;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            text-align: center;
        }
        .bday-title {
            font-size: clamp(2rem, 8vw, 4rem);
            margin-top: 50px;
            margin-bottom: 20px;
            font-family: 'Dancing Script', cursive, serif;
            animation: bounce 2s infinite;
        }
        .bday-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 500px;
            margin-bottom: 40px;
            transform: rotate(-2deg);
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .music-footer {
            width: 100%;
            max-width: 600px;
            margin-top: auto;
            margin-bottom: 20px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container" id="main-container">
        <h1 id="question">Who do you love more?</h1>
        
        <div class="choices">
            <div class="square" id="haechan-box">
                <img id="haechan-img" src="https://static.wikia.nocookie.net/kboy-group/images/0/07/HAECHAN_icon.png" alt="Haechan">
            </div>

            <div class="square" id="me-box">
                <div class="me-text">
                    <span class="arrow arrow-left">&gt;</span>
                    <span>Me</span>
                    <span class="arrow arrow-right">&lt;</span>
                    <span id="checkmark">✅</span>
                </div>
            </div>
        </div>

        <button class="birthday-btn" id="bday-btn" onclick="triggerBirthdayState()">Happy Birthday Zizi 🎂</button>
    </div>

    <!-- Birthday Screen (Hidden by default) -->
    <div id="birthday-screen" class="birthday-screen">
        <h1 class="bday-title">Happy Birthday Zizi! ✨</h1>
        <div class="bday-card">
            <p style="font-size: 1.2rem; line-height: 1.6;">
                Semoga hari spesialmu ini seindah senyummu. <br>
                Teruslah bersinar dan bahagia selalu! 💖
            </p>
            <p style="font-style: italic; margin-top: 20px; color: #888;">- With love -</p>
        </div>

        <!-- 4 Photo Frames -->
        <div class="photo-grid">
            <div class="photo-frame">
                <div class="photo-placeholder"><div></div></div>
            </div>
            <div class="photo-frame">
                <div class="photo-placeholder"><div></div></div>
            </div>
            <div class="photo-frame">
                <div class="photo-placeholder"><div></div></div>
            </div>
            <div class="photo-frame">
                <div class="photo-placeholder"><div></div></div>
            </div>
        </div>
        
        <!-- Local MP3 Player -->
        <div class="music-footer" style="background: white; padding: 10px;">
            <audio id="bg-music" src="CRZY.mp3" preload="auto" controls style="width: 100%;"></audio>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        const haechan = document.getElementById('haechan-box');
        const hImg = document.getElementById('haechan-img');
        const me = document.getElementById('me-box');
        const question = document.getElementById('question');
        const body = document.body;
        
        let haechanScale = 1;
        let meScale = 1;
        let isFinal = false;

        // Preload bin.png
        const preloadImg = new Image();
        preloadImg.src = 'bin.png';

        const triggerFinalState = () => {
            if (isFinal) return;
            isFinal = true;

            // Tambahkan class final-state DULUAN agar transisi lambat aktif
            body.classList.add('final-state');

            // 1. Center Haechan (Kecil)
            const finalHScale = Math.min(haechanScale, 0.25);
            haechan.classList.add('moved');
            haechan.style.left = '50%';
            haechan.style.top = '50%';
            haechan.style.transform = `translate(-50%, -50%) scale(${finalHScale})`;
            
            // 2. Change Image
            hImg.src = 'bin.png';

            // 3. Update Text
            question.innerText = "I KNEW IT! ❤️";
            question.style.transform = "translateY(-50px)";

            // 4. Fade Out Haechan (lebih lama karena pergerakannya melambat)
            setTimeout(() => {
                haechan.style.opacity = "0";
                haechan.style.pointerEvents = "none";
            }, 2500);
        };

        const triggerBirthdayState = () => {
            document.getElementById('main-container').style.display = 'none';
            if(haechan) haechan.style.display = 'none';
            
            const bdayScreen = document.getElementById('birthday-screen');
            bdayScreen.style.display = 'flex';
            document.body.style.background = '#fff0f5';
            document.body.style.overflow = 'auto';

            // Play music
            const music = document.getElementById('bg-music');
            if (music) {
                music.play().catch(e => console.log("Autoplay blocked or failed:", e));
            }

            const end = Date.now() + (3 * 1000);
            const colors = ['#ff69b4', '#ffffff', '#008080'];

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60, spread: 55, origin: { x: 0 }, colors: colors
                });
                confetti({
                    particleCount: 3,
                    angle: 120, spread: 55, origin: { x: 1 }, colors: colors
                });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        };

        haechan.addEventListener('click', () => {
            if (isFinal) return;
            haechan.classList.add('moved');
            const rect = haechan.getBoundingClientRect();
            const randomX = Math.max(0, Math.floor(Math.random() * (window.innerWidth - rect.width)));
            const randomY = Math.max(0, Math.floor(Math.random() * (window.innerHeight - rect.height)));

            haechanScale *= 0.75; 
            meScale *= 1.25;      

            haechan.style.left = randomX + 'px';
            haechan.style.top = randomY + 'px';
            haechan.style.transform = `scale(${haechanScale})`;
            me.style.transform = `scale(${meScale})`;

            question.style.transform = `translateY(-${(meScale - 1) * 100}px)`;

            if (haechanScale < 0.25) triggerFinalState();
        });

        me.addEventListener('click', () => {
            triggerFinalState();
        });
    </script>
</body>
</html>
