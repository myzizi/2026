<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who Do You Love? - MyZizi 2026</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #008080; /* Background Teal */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
            overflow: hidden;
            position: relative;
            transition: background-color 1s ease, color 1s ease;
        }
        .container {
            text-align: center;
            padding: 2rem;
            width: 100%;
            max-width: 800px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.4s ease;
        }
        h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            transition: all 1s ease;
        }
        .choices {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            flex-wrap: nowrap;
        }
        .square {
            width: clamp(120px, 40vw, 200px);
            height: clamp(120px, 40vw, 200px);
            background: white;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
        }
        .square img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .me-text {
            color: #008080;
            font-size: clamp(1rem, 4vw, 2rem);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            transition: color 1s ease;
        }
        .arrow { display: inline-block; }
        .arrow-left { animation: moveLeft 1.2s infinite ease-in-out; }
        .arrow-right { animation: moveRight 1.2s infinite ease-in-out; }
        
        @keyframes moveLeft {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(8px); }
        }
        @keyframes moveRight {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-8px); }
        }
        
        .nav-link {
            display: inline-block;
            margin-top: 50px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.5s;
        }

        #haechan-box.moved {
            position: fixed;
            z-index: 100;
        }

        /* Final State Styles */
        body.final-state {
            background-color: white !important;
            color: #008080 !important;
            transition: none !important;
        }
        body.final-state h1 {
            text-shadow: none;
            font-weight: bold;
        }
        body.final-state #me-box {
            background-color: white !important;
            box-shadow: none;
            transform: scale(1) !important;
        }
        body.final-state #haechan-box {
            background: transparent !important;
            box-shadow: none !important;
        }
        body.final-state .nav-link {
            color: #008080;
        }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <h1 id="question">Who do you love more?</h1>
        
        <div class="choices">
            <div class="square" id="haechan-box">
                <img id="haechan-img" src="https://static.wikia.nocookie.net/kboy-group/images/0/07/HAECHAN_icon.png" alt="Haechan">
            </div>

            <div class="square" id="me-box">
                <div class="me-text">
                    <span class="arrow arrow-left">&gt;</span>
                    <span>Me</span>
                    <span class="arrow arrow-right">&lt;</span>
                </div>
            </div>
        </div>

        <a href="bin.html" class="nav-link">Ke Halaman Musik 🎵</a>
    </div>

    <script>
        const haechan = document.getElementById('haechan-box');
        const hImg = document.getElementById('haechan-img');
        const me = document.getElementById('me-box');
        const question = document.getElementById('question');
        const body = document.body;
        
        let haechanScale = 1;
        let meScale = 1;

        // Preload bin.png
        const preloadImg = new Image();
        preloadImg.src = 'bin.png';

        haechan.addEventListener('click', () => {
            if (haechanScale < 0.25) return; // Stop jika sudah di final state

            haechan.classList.add('moved');

            const rect = haechan.getBoundingClientRect();
            const maxX = window.innerWidth - rect.width;
            const maxY = window.innerHeight - rect.height;

            const randomX = Math.max(0, Math.floor(Math.random() * maxX));
            const randomY = Math.max(0, Math.floor(Math.random() * maxY));

            haechanScale *= 0.75; 
            meScale *= 1.25;      

            haechan.style.left = randomX + 'px';
            haechan.style.top = randomY + 'px';
            haechan.style.transform = `scale(${haechanScale})`;
            me.style.transform = `scale(${meScale})`;

            const pushAmount = (meScale - 1) * 100;
            question.style.transform = `translateY(-${pushAmount}px)`;

            // Final state logic (Triggered sooner)
            if (haechanScale < 0.25) {
                // 1. Center Haechan (Kecil)
                haechan.style.left = '50%';
                haechan.style.top = '50%';
                haechan.style.transform = `translate(-50%, -50%) scale(${haechanScale})`;
                
                // 2. Change Image (Should be instant due to preload)
                hImg.src = 'bin.png';

                // 3. Apply Final State Class
                body.classList.add('final-state');
                question.innerText = "I KNEW IT! ❤️";
                question.style.transform = "translateY(-50px)";

                // 4. Fade Out Haechan
                setTimeout(() => {
                    haechan.style.opacity = "0";
                    haechan.style.pointerEvents = "none";
                }, 1500);
            }
        });
    </script>
</body>
</html>
