<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who Do You Love? - MyZizi 2026</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #008080; /* Background Teal */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 1rem;
            width: 100%;
            max-width: 600px;
        }
        h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .choices {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: nowrap; /* Memaksa tetap berdampingan */
        }
        .square {
            width: clamp(120px, 40vw, 200px);
            height: clamp(120px, 40vw, 200px);
            background: white;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            flex-shrink: 0; /* Mencegah kotak gepeng */
        }
        .square:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
        .square img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .me-text {
            color: #008080;
            font-size: clamp(1rem, 4vw, 2rem);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .arrow {
            display: inline-block;
        }
        .arrow-left {
            animation: moveLeft 1.2s infinite ease-in-out;
        }
        .arrow-right {
            animation: moveRight 1.2s infinite ease-in-out;
        }
        @keyframes moveLeft {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(8px); }
        }
        @keyframes moveRight {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-8px); }
        }
        
        .nav-link {
            display: inline-block;
            margin-top: 30px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Who do you love more?</h1>
        
        <div class="choices">
            <!-- Kotak 1: Haechan -->
            <div class="square" onclick="location.href='bin.html'">
                <img src="https://static.wikia.nocookie.net/kboy-group/images/0/07/HAECHAN_icon.png" alt="Haechan">
            </div>

            <!-- Kotak 2: Me -->
            <div class="square">
                <div class="me-text">
                    <span class="arrow arrow-left">&gt;</span>
                    <span>Me</span>
                    <span class="arrow arrow-right">&lt;</span>
                </div>
            </div>
        </div>

        <a href="bin.html" class="nav-link">Ke Halaman Musik 🎵</a>
    </div>
</body>
</html>
