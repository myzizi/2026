<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyZizi 2026</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #1a73e8; }
        p { color: #5f6368; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Halo dari MyZizi 2026!</h1>
        <p>File ini dibuat otomatis untuk repositori Anda.</p>
        
        <div style="margin-top: 20px;">
            <audio id="bgMusic" style="width: 100%; max-width: 300px;" controls preload="auto">
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                Browser Anda tidak mendukung streaming audio.
            </audio>
            <p style="font-size: 12px; color: #888;">Contoh Streaming MP3 (Auto-buffering)</p>
        </div>
    </div>
</body>
</html>
